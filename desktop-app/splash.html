<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Złote Miody - Ładowanie</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: transparent;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .container {
      background: #0a0a0a;
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 40px rgba(245, 158, 11, 0.05);
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #f59e0b;
      margin: 0 0 10px 0;
    }
    .subtitle {
      color: #737373;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress-value {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 50%;
      background: #f59e0b;
      border-radius: 2px;
      animation: load 1.5s infinite linear;
    }
    .version {
      position: absolute;
      bottom: 20px;
      color: #555;
      font-size: 12px;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    @keyframes load {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" class="logo" alt="Logo" onerror="this.style.display='none'">
    <h1 class="title">Złote Miody</h1>
    <div class="subtitle">Łączenie z serwerem...</div>
    <div class="progress-bar">
      <div class="progress-value"></div>
    </div>
    <div class="version">v1.0.0</div>
  </div>
</body>
</html>
