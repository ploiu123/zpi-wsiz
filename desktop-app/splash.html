<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Złote Miody</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .splash {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 24px;
    box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .loader {
    width: 40px;
    height: 40px;
    margin: 0 auto;
    border: 3px solid rgba(245, 158, 11, 0.15);
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3); }
    50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(245, 158, 11, 0.4); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="logo">🍯</div>
    <h1>Złote Miody</h1>
    <p class="subtitle">Ładowanie sklepu…</p>
    <div class="loader"></div>
  </div>
</body>
</html>
